<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <title>GymShark - Allenati bene</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="icon" type="image/ico" href="assets/recollect/icons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap"
    rel="stylesheet" />
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/recollect/icons/icon-192x192.png">
</head>

<body>
  <app-root>
    <!-- Splash screen PWA - rimosso automaticamente al bootstrap Angular -->
    <style>
      .app-splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 32px;
        z-index: 9999;
      }
      .app-splash img {
        width: 120px;
        height: 120px;
        object-fit: contain;
      }
      .app-splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top: 3px solid #ffffff;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <div class="app-splash">
      <img src="assets/recollect/images/logo-icon.png" alt="GymShark" />
      <div class="app-splash-spinner"></div>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
