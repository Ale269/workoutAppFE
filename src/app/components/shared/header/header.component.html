
<mat-toolbar class="header">

    <div class="logo">
        <span>♾️ Re-Collect. Dai nuova vita agli oggetti</span>
    </div>

    <div class="spacer"></div>

    <div class="header-actions">

        <app-theme-toggle (themeChanged)="onThemeToggle()"></app-theme-toggle>

        @if (user) {
            <button
                    mat-icon-button
                    class="user-avatar-button"
                    [matMenuTriggerFor]="userMenu" >
                <span class="user-initials">{{ getInitialName() }}</span>
            </button>

            <mat-menu #userMenu="matMenu">
                <div class="user-info">
                    <p>{{ user.firstName }} {{ user.lastName }}</p>
                    <small>{{ user.email }}</small>
                </div>

                <mat-divider></mat-divider>

                <button
                        mat-menu-item
                        (click)="onProfile()">
                    <span>{{  'common.profile' | translate }}</span>
                </button>

                <mat-divider></mat-divider>

                <button
                        mat-menu-item
                        (click)="onFavoriteItems()">
                    <span>{{  'common.favorites' | translate }}</span>
                </button>

                <mat-divider></mat-divider>

                <button
                        mat-menu-item
                        (click)="onFavoriteSearches()">
                    <span>{{  'common.favoriteSearch' | translate }}</span>
                </button>

                <mat-divider></mat-divider>

                <button
                        mat-menu-item
                        (click)="onLogout()">
                    <span>{{  'auth.logout' | translate }}</span>
                </button>
            </mat-menu>
        } @else if (!user) {
            <button
                    mat-raised-button
                    (click)="onLogin()"
                    class="login-button-header">
                <span>{{ 'auth.login' | translate }}</span>
            </button>
        }
    </div>

</mat-toolbar>
