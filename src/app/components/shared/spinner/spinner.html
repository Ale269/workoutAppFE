@if(config.id) {
<div class="spinner-overlay" #spinnerOverlay>
  <div class="spinner-container">
    <!-- Spinner rotante - appare solo dopo il delay -->
    @if(shouldShowSpinner && !showResult) {
      <div class="spinner" #spinnerElement></div>
    }

    <!-- Risultato finale -->
    @if(showResult && finalResult) {
      <div
        class="result-icon"
        #resultElement
        [class]="'result-icon result-' + finalResult"
      >
        <img [src]="getResultIcon()" [alt]="'Result: ' + finalResult" />
      </div>
    }

    <!-- Messaggio - appare solo con lo spinner -->
    @if(getCurrentMessage() && shouldShowSpinner) {
      <p class="spinner-text" #messageElement>{{ getCurrentMessage() }}</p>
    }
  </div>
</div>
}
