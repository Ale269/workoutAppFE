<!-- generic-modal.html -->
<div #modalOverlay class="modal-overlay" (click)="onOverlayClick($event)">
  <div
    #modalContainer
    class="modal-container"
    (click)="$event.stopPropagation()"
  >
    <!-- Header del modale -->
    <div class="modal-header">
      <div></div>
      <div>
        <ng-content select="[slot=header]"></ng-content>
      </div>
      <div class="delete-icon-element-container">
        <div class="close-icon-trigger" (click)="close()"></div>
        <img src="assets/recollect/svg/google-close-icon.svg" />
      </div>
    </div>

    <!-- Contenuto principale -->
    <div class="modal-body">
      <ng-content></ng-content>
    </div>

    <!-- Footer del modale -->
    <div class="modal-footer">
      <div>
        <div class="btn btn-secondary" (click)="close()">
          <ng-content select="[slot=footer-btn-close]"></ng-content>
        </div>
      </div>
      <div>
        <div class="btn btn-primary" (click)="confirm()">
          <ng-content select="[slot=footer-btn-confirm]"></ng-content>
        </div>
      </div>
    </div>
  </div>
</div>
