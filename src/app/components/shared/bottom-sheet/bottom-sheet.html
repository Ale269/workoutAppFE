<div #backdrop class="bottom-sheet-backdrop" (click)="onBackdropClick()"></div>

<div #container class="bottom-sheet-container" [ngClass]="instance.cssClass">
  @if(instance.dismissible){
  <div #handle class="bottom-sheet-handle">
    <div #handle class="handle-trigger"></div>
    <div class="handle-bar"></div>
  </div>
  }
  <div class="bottom-sheet-content">
    <ng-container #dynamicComponent></ng-container>
  </div>
</div>
