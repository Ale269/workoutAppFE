<!-- list-template-plans.html -->
<div class="content">
  <div class="section-title-container">
    <h1 class="text-title">I tuoi template schede</h1>
  </div>
  <div class="lista-template-schede-container">
    @for (scheda of listaSchede; track scheda.id; let i = $index) {
    <div class="template-scheda" (click)="visualizzaDatiScheda(scheda.id)">
      <div class="nome-data-scheda">
        <h3 class="text-white">{{ scheda.nomeScheda }}</h3>
        <h3 class="text-grey">
          Creata il {{ scheda.dataCreazione | date: "dd/MM/yyyy" }}
        </h3>
      </div>
    </div>
    } @empty {
    <h3 class="text-white">Nessuna scheda aggiunta</h3>
    }
  </div>

  <div class="floating-static-button-container">
    <div class="floating-actions-workout">
      <button class="floating-static-button" (click)="guidaImportScheda()">
          <span>Guida per import</span>
      </button>
      <button class="floating-static-button" (click)="importScheda()">
          <span>Importa scheda</span>
      </button>
      <button class="floating-static-button" (click)="createNewScheda()">
          <span>Nuova scheda</span>
      </button>
    </div>
  </div>
</div>
