<div class="info-container">
  <div class="info-card">
    <h1 class="info-title">Informazioni App</h1>

    <div class="info-section">
      <div class="info-item">
        <span class="info-label">Versione:</span>
        <span class="info-value">{{ appVersion }}</span>
      </div>

      <div class="info-item">
        <span class="info-label">Data Build:</span>
        <span class="info-value">{{ buildDate }}</span>
      </div>

      <div class="info-item">
        <span class="info-label">Nome App:</span>
        <span class="info-value">{{ appName }}</span>
      </div>
    </div>
  </div>
</div>
