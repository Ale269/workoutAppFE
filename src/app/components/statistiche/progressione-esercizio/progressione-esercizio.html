@if (dati && dati.labels.length > 0) {
  <div class="chart-container">
    <canvas baseChart
      [data]="lineChartData"
      [options]="lineChartOptions"
      type="line">
    </canvas>
  </div>
} @else {
  <div class="empty-state">
    <span class="empty-text">Seleziona un esercizio per vedere la progressione</span>
  </div>
}
