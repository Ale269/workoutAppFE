@if (records.length > 0) {
  <div class="records-list">
    @for (record of records; track record.idTipoEsercizio) {
      <div class="record-item">
        <div class="record-icon">
          <img [src]="getIconPath(record.idIcona)"
               [style.filter]="'drop-shadow(0 0 4px ' + getIconColor(record.idTipoEsercizio) + ')'" />
        </div>
        <div class="record-info">
          <span class="record-name">{{ record.nomeEsercizio }}</span>
          <span class="record-date">{{ formatData(record.dataRecord) }}</span>
        </div>
        <div class="record-value">
          <span class="record-weight">{{ record.maxCarico }}</span>
          <span class="record-unit">kg</span>
        </div>
      </div>
    }
  </div>
} @else {
  <div class="empty-state">
    <span class="empty-text">Nessun record registrato</span>
  </div>
}
