@if (dati.length > 0) {
  <div class="chart-container">
    <canvas baseChart
      [data]="doughnutChartData"
      [options]="doughnutChartOptions"
      type="doughnut">
    </canvas>
  </div>
} @else {
  <div class="empty-state">
    <span class="empty-text">Nessun dato disponibile</span>
  </div>
}
