<div class="exercise-container">
  <div class="titolo-esercizio-container">
    <div class="icona-numero-esercizio-container">
      <img
        [src]="exerciseIconPath"
        [alt]="'Icona esercizio ' + this.formEsercizio.form.controls['idIconaEsercizio'].value"
        class="exercise-icon"
      />
      <h3 class="text-white">
        Esercizio {{this.formEsercizio.form.controls['identifier'].value}}
      </h3>
    </div>
    <div class="delete-icon-element-container">
      <div class="close-icon-trigger" (click)="openDeleteModal()"></div>
      <img src="assets/recollect/svg/google-close-icon.svg" />
    </div>
  </div>
  <form [formGroup]="formEsercizio.form">
    <div class="input-row">
      <!-- <mat-form-field
        appearance="outline"
        class="full-width"
        [style.padding-bottom]="
            this.formEsercizio.form.controls['nomeEsercizio'].touched &&
            !this.formEsercizio.form.controls['nomeEsercizio'].valid
              ? '16px'
              : '0'
          "
      >
        <mat-label>Nome esercizio </mat-label>
        <input
          matInput
          [type]="'text'"
          formControlName="nomeEsercizio"
          placeholder="Nome esercizio"
        />
        @if
        (this.formEsercizio.form.controls['nomeEsercizio']?.hasError('required'))
        {
        <mat-error>Nome esercizio obbligatorio</mat-error>
        }
      </mat-form-field> -->
      <app-gym-exercise-selector
        [control]="this.idTipoEsercizioControl"
        label="Esercizio"
      >
      </app-gym-exercise-selector>
    </div>

    @for (serieForm of this.formEsercizio.listaSerieForm; track
    serieForm.form.controls['identifier'].value) {
    <app-set-component [formSerie]="serieForm"></app-set-component>

    } @empty { }
  </form>
</div>

<!-- Template per il modale -->

<ng-template #headerDeleteWorkout>
  <img
    src="assets/recollect/images/icona-stop-modifica.png"
    alt="Attenzione"
    class="warning-icon"
  />
</ng-template>

<!-- Template per il body -->
<ng-template #bodyDeleteWorkout>
  <h3 class="text-white">Sei sicuro di voler eliminare questo esercizio?</h3>
  <h3 class="text-white">Questa azione non può essere annullata.</h3>
</ng-template>

<!-- Template per il bottone di chiusura -->
<ng-template #footerCloseDeleteWorkout>
  <button class="text-shape-button-cancel" slot="footer-btn-close">
    <span>Annulla</span>
    <div class="text-shape-button-icon-container-cancel">
      <img src="assets/recollect/svg/google-close-icon.svg" />
    </div>
  </button>
</ng-template>

<!-- Template per il bottone di conferma -->
<ng-template #footerConfirmDeleteWorkout>
  <button class="text-shape-button-danger">
    <span>Elimina</span>
    <div class="text-shape-button-icon-container-danger">
      <img src="assets/recollect/svg/google-delete.svg" />
    </div>
  </button>
</ng-template>
