<div class="content">
  <div class="section-container close-icon-title-container">
    <div class="close-icon-section-container">
      <div class="close-icon-trigger"></div>
      <img src="assets/recollect/svg/google-close-icon.svg" />
    </div>
    <h1 class="text-title">Nuova scheda</h1>
  </div>

  <div class="tab-container">
    <mat-tab-group
      #tabGroup
      [(selectedIndex)]="selectedTabIndex"
      (selectedTabChange)="onTabChange($event)"
      animationDuration="300ms"
      class="custom-tab-group"
    >
      @for (allenamentoForm of
      createOrEditTemplatePlanService.formScheda.listaAllenamentiForm; track
      allenamentoForm.form.controls['identifier'].value; let i = $index) {
      <mat-tab [label]="allenamentoForm.form.controls['nomeAllenamento'].value">
        <ng-template matTabContent>
          <app-workout-component
            (onAddWorkout)="addWorkout($event)"
            [formScheda]="this.createOrEditTemplatePlanService.formScheda"
            (onDeleteWorkout)="deleteWorkout($event)"
            [formAllenamento]="allenamentoForm"
          >
          </app-workout-component>
        </ng-template>
      </mat-tab>
      } @empty { }
    </mat-tab-group>
  </div>
</div>
