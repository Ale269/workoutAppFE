<!-- app.component.html -->
<div class="app-container" [class]="currentTheme">
  @if(this.MenuIsVisible){
  <app-menu-component></app-menu-component>
  }

  <div class="main-content-wrapper">
    <router-outlet></router-outlet>
  </div>

  @for (modal of modalService.modals(); track modal) {
  <app-generic-modal
    [isVisible]="true"
    [title]="modal.title"
    [warning]="modal.warning ?? false"
    [showConfirmButton]="modal.showConfirmButton ?? false"
    [confirmText]="modal.confirmText ?? 'Conferma'"
    [cancelText]="modal.cancelText ?? 'Annulla'"
    [headerTemplate]="modal.headerTemplate"
    [bodyTemplate]="modal.bodyTemplate"
    [footerCloseTemplate]="modal.footerCloseTemplate"
    [footerConfirmTemplate]="modal.footerConfirmTemplate"
    (closed)="modalService.close(modal)"
    (confirmed)="modalService.confirm(modal)"
  >
  </app-generic-modal>
  }
</div>
