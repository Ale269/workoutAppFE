server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve Angular app sotto /gymshark/
    location /gymshark/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /gymshark/index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }

    # Redirect /gymshark senza trailing slash
    location = /gymshark {
        return 301 /gymshark/;
    }

    # Service worker e manifest (path assoluti con prefisso)
    location ~ ^/gymshark/(ngsw-worker\.js|ngsw\.json|safety-worker\.js|worker-basic\.min\.js)$ {
        alias /usr/share/nginx/html/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /gymshark/manifest.json {
        alias /usr/share/nginx/html/manifest.json;
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Asset statici con cache lunga
    location ~* ^/gymshark/.*\.(json|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|js|css)$ {
        alias /usr/share/nginx/html/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}